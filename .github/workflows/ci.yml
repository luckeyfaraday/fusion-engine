name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[server,test]"
      - name: Compile
        run: python -m py_compile cli.py fusion.py panels.py server.py evals/benchmarks.py evals/graders.py evals/prepare.py evals/report.py evals/run_eval.py evals/systems.py
      - name: Smoke CLI
        run: python cli.py panels
      - name: Test
        run: pytest -q
